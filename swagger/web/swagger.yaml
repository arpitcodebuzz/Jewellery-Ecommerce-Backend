          schema:
            type: integer
            default: 1
            minimum: 1
          example: 1
        - name: limit
          in: query
          description: Number of products per page (default 10, max 100)
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 100
          example: 10
        - name: search
          in: query
