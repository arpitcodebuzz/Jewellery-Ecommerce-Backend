openapi: 3.0.0
info:
  title: JEWELLERY ECOMMERCE WEB API
  version: 1.0.0
  description: Web APIs for Jewellery Ecommerce Platform

servers:
  - url: https://2prbc8z4-5000.inc1.devtunnels.ms/api
    description: DevTunnel public server

tags:
  - name: Auth
    description: Authentication and Profile Management APIs
  - name: Products
    description: Product Catalog and Browse APIs
  - name: Addresses
    description: User Address Management APIs
  - name: Cart
    description: Shopping Cart Management APIs

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT Bearer Token for authenticated requests

  schemas:
    ErrorResponse:
      type: object
      properties:
        status:
          type: boolean
          example: false
        message:
          type: string
          example: Error message
      required:
        - status
        - message

    SuccessResponse:
      type: object
      properties:
        status:
          type: boolean
          example: true
        message:
          type: string
        data:
          type: object
      required:
        - status
        - message

    AuthResponse:
      type: object
      properties:
        status:
          type: boolean
          example: true
        message:
          type: string
          example: Login successful !!
        data:
          type: object
          properties:
            accessToken:
              type: string
              example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6MSwicm9sZSI6InVzZXIifQ...
      required:
        - status
        - message
        - data

    User:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
          format: email
        name:
          type: string
        phone:
          type: string
        email_verified:
          type: boolean
        google_id:
          type: string
          nullable: true
        provider_Type:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    MetalComponent:
      type: object
      properties:
        id:
          type: integer
        product_id:
          type: integer
        metal_type:
          type: string
          enum: [gold, silver, platinum]
          example: gold
        purity_code:
          type: string
          example: 22K
        purity_value:
          type: number
          example: 91.67
        weight_grams:
          type: number
          example: 5.5
        is_primary:
          type: boolean

    StoneComponent:
      type: object
      properties:
        id:
          type: integer
        product_id:
          type: integer
        stone_type:
          type: string
          example: diamond
        clarity_grade:
          type: string
          example: VS1
        color_grade:
          type: string
          example: D
        cut_grade:
          type: string
          example: Excellent
        weight_carat:
          type: number
          example: 0.5
        piece_count:
          type: integer
          example: 1

    PriceBreakdown:
      type: object
      properties:
        quantity:
          type: integer
          example: 1
        subtotal:
          type: number
          example: 5500.00
        metal_cost:
          type: number
          example: 3000.00
        making_charge:
          type: number
          example: 1200.00
        stone_cost:
          type: number
          example: 800.00
        wastage_charge:
          type: number
          example: 150.00
        margin:
          type: number
          example: 300.00
        gst:
          type: number
          example: 660.00
        total:
          type: number
          example: 6160.00
        store_state:
          type: string
          example: Gujarat
        shipping_state:
          type: string
          nullable: true
          example: null

    Product:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
          example: Diamond Ring
        sku:
          type: string
          example: RNG-GOLD-001
        product_type:
          type: string
          enum: [ring, earring, pendant, kada, bracelet, chain, coin, bar]
          example: ring
        target_gender:
          type: string
          enum: [men, women, unisex]
          example: women
        category_id:
          type: integer
          example: 1
        category_name:
          type: string
          example: Rings
        collection_id:
          type: integer
          nullable: true
          example: 2
        collection_name:
          type: string
          nullable: true
          example: Wedding Collection
        default_metal_type:
          type: string
          enum: [gold, silver, platinum]
          example: gold
        making_charge_type:
          type: string
          enum: [per_gram, fixed]
          example: per_gram
        making_charge_value:
          type: number
          example: 200.00
        wastage_percent:
          type: number
          example: 2.5
        margin_percent:
          type: number
          example: 5.0
        gst_percent:
          type: number
          example: 3
        status:
          type: string
          enum: [active, inactive]
          example: active
        metals:
          type: array
          items:
            $ref: '#/components/schemas/MetalComponent'
        stones:
          type: array
          items:
            $ref: '#/components/schemas/StoneComponent'
        flags:
          type: object
          properties:
            metal_added:
              type: boolean
            stone_added:
              type: boolean
        price:
          $ref: '#/components/schemas/PriceBreakdown'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 10
        total:
          type: integer
          example: 50
        totalPages:
          type: integer
          example: 5

    ProductListResponse:
      type: object
      properties:
        status:
          type: boolean
          example: true
        message:
          type: string
          example: Products retrieved successfully
        data:
          type: array
          items:
            $ref: '#/components/schemas/Product'
        meta:
          $ref: '#/components/schemas/Pagination'

    Address:
      type: object
      properties:
        id:
          type: integer
          example: 1
        user_id:
          type: integer
          example: 1
        full_name:
          type: string
          example: John Doe
        phone:
          type: string
          example: "9876543210"
        address_line1:
          type: string
          example: "123, Main Street"
        address_line2:
          type: string
          nullable: true
          example: "Near Park"
        city:
          type: string
          example: "Surat"
        state:
          type: string
          example: "Gujarat"
        postal_code:
          type: string
          example: "395001"
        country:
          type: string
          example: "India"
        is_default:
          type: boolean
          example: true
        address_type:
          type: string
          enum: [home, work, other]
          example: home
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    AddressListResponse:
      type: object
      properties:
        status:
          type: boolean
          example: true
        message:
          type: string
          example: Addresses retrieved successfully
        data:
          type: array
          items:
            $ref: '#/components/schemas/Address'
      required:
        - status
        - message
        - data

    CartItem:
      type: object
      properties:
        id:
          type: integer
          example: 1
        cart_id:
          type: integer
          example: 1
        product_id:
          type: integer
          example: 1
        quantity:
          type: integer
          example: 2
        created_at:
          type: string
          format: date-time
        product:
          type: object
          properties:
            id:
              type: integer
              example: 1
            name:
              type: string
              example: "Diamond Ring"
            sku:
              type: string
              example: "RNG-GOLD-001"
            product_type:
              type: string
              example: "ring"
            target_gender:
              type: string
              example: "women"
            status:
              type: string
              example: "active"
            image_url:
              type: string
              nullable: true
              example: "https://example.com/image.jpg"

    Cart:
      type: object
      properties:
        cart_id:
          type: integer
          example: 1
        status:
          type: string
          example: "active"
        items:
          type: array
          items:
            $ref: '#/components/schemas/CartItem'
        total_items:
          type: integer
          example: 1

    CartResponse:
      type: object
      properties:
        status:
          type: boolean
          example: true
        message:
          type: string
          example: Cart retrieved successfully
        data:
          $ref: '#/components/schemas/Cart'
      required:
        - status
        - message
        - data

paths:
  /auth/send-otp:
    post:
      tags:
        - Auth
      summary: Send OTP to email
      description: Send OTP via email for email verification or password reset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
                purpose:
                  type: string
                  enum: [VERIFY_EMAIL, FORGOT_PASSWORD]
                  example: VERIFY_EMAIL
              required:
                - email
                - purpose
            examples:
              verify_email:
                summary: Send OTP for email verification
                value:
                  email: john@example.com
                  purpose: VERIFY_EMAIL
              forgot_password:
                summary: Send OTP for password reset
                value:
                  email: john@example.com
                  purpose: FORGOT_PASSWORD
      responses:
        '200':
          description: OTP sent successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Otp sent successfully !!
                  data:
                    type: object
                    properties:
                      otp:
                        type: string
                        example: '123456'
              examples:
                success:
                  summary: Successful OTP send
                  value:
                    status: true
                    message: Otp sent successfully !!
                    data:
                      otp: '123456'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security: []

  /auth/verify-otp:
    post:
      tags:
        - Auth
      summary: Verify OTP and get access token
      description: Verify OTP with email and purpose to get JWT access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
                otp:
                  type: string
                  minLength: 6
                  maxLength: 6
                  example: '123456'
                purpose:
                  type: string
                  enum: [VERIFY_EMAIL, FORGOT_PASSWORD]
                  example: VERIFY_EMAIL
              required:
                - email
                - otp
                - purpose
            examples:
              verify_email:
                summary: Verify OTP for email verification
                value:
                  email: john@example.com
                  otp: '123456'
                  purpose: VERIFY_EMAIL
              forgot_password:
                summary: Verify OTP for password reset
                value:
                  email: john@example.com
                  otp: '123456'
                  purpose: FORGOT_PASSWORD
      responses:
        '200':
          description: OTP verified successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
              examples:
                success:
                  summary: Successful OTP verification
                  value:
                    status: true
                    message: Otp verified successfully !!
                    data:
                      accessToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6MSwicm9sZSI6InVzZXIifQ.dummytoken123456
        '400':
          description: Invalid or expired OTP
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security: []

  /auth/verify-email:
    post:
      tags:
        - Auth
      summary: Verify email with OTP
      description: Verify email address using OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
                otp:
                  type: string
                  minLength: 6
                  maxLength: 6
                  example: '123456'
              required:
                - email
                - otp
            examples:
              success:
                summary: Email verification request
                value:
                  email: john@example.com
                  otp: '123456'
      responses:
        '200':
          description: Email verified successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
              examples:
                success:
                  summary: Email verified successfully
                  value:
                    status: true
                    message: Email verified successfully !!
        '400':
          description: Invalid or expired OTP
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security: []

  /auth/create-account:
    post:
      tags:
        - Auth
      summary: Create user account
      description: Create a new user account with email, name, phone, and password. Email must be verified first.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
                name:
                  type: string
                  minLength: 2
                  maxLength: 100
                  example: John Doe
                phone:
                  type: string
                  pattern: '^[0-9+]{10,15}$'
                  example: '+919876543210'
                password:
                  type: string
                  minLength: 6
                  maxLength: 30
                  example: securePassword123
              required:
                - email
                - name
                - phone
                - password
            examples:
              success:
                summary: Create account request
                value:
                  email: john@example.com
                  name: John Doe
                  phone: '+919876543210'
                  password: SecurePass@123
      responses:
        '200':
          description: Account created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
              examples:
                success:
                  summary: Account created successfully
                  value:
                    status: true
                    message: Account created successfully !!
                    data:
                      accessToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6MSwicm9sZSI6InVzZXIifQ.dummytoken123456
        '400':
          description: Email not verified or account already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security: []

  /auth/login:
    post:
      tags:
        - Auth
      summary: User login
      description: Login with email and password to get access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
                password:
                  type: string
                  example: securePassword123
              required:
                - email
                - password
            examples:
              success:
                summary: Login request
                value:
                  email: john@example.com
                  password: SecurePass@123
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
              examples:
                success:
                  summary: Login successful
                  value:
                    status: true
                    message: Login successful !!
                    data:
                      accessToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6MSwicm9sZSI6InVzZXIifQ.dummytoken123456
        '400':
          description: Invalid credentials or email not verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security: []

  /auth/forgot-password:
    post:
      tags:
        - Auth
      summary: Reset password
      description: Reset user password after OTP verification. Requires authentication.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
                password:
                  type: string
                  minLength: 6
                  maxLength: 30
                  example: newSecurePassword123
              required:
                - email
                - password
            examples:
              success:
                summary: Reset password request
                value:
                  email: john@example.com
                  password: NewSecurePass@123
      responses:
        '200':
          description: Password updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
              examples:
                success:
                  summary: Password reset successful
                  value:
                    status: true
                    message: Password updated successfully !!
        '400':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Invalid or missing token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/change-password:
    post:
      tags:
        - Auth
      summary: Change password
      description: Change user password by providing old and new password. Requires authentication.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
                old_password:
                  type: string
                  example: oldPassword123
                new_password:
                  type: string
                  minLength: 6
                  maxLength: 30
                  example: newPassword123
              required:
                - email
                - old_password
                - new_password
            examples:
              success:
                summary: Change password request
                value:
                  email: john@example.com
                  old_password: OldSecurePass@123
                  new_password: NewSecurePass@456
      responses:
        '200':
          description: Password updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
              examples:
                success:
                  summary: Password changed successfully
                  value:
                    status: true
                    message: Password updated successfully !!
        '400':
          description: Invalid old password or user not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Invalid or missing token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/get-profile:
    get:
      tags:
        - Auth
      summary: Get user profile
      description: Retrieve authenticated user's profile information. Requires JWT token.
      responses:
        '200':
          description: Profile fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Profile fetched successfully !!
                  data:
                    $ref: '#/components/schemas/User'
              examples:
                success:
                  summary: Profile fetched successfully
                  value:
                    status: true
                    message: Profile fetched successfully !!
                    data:
                      id: 1
                      email: john@example.com
                      name: John Doe
                      phone: '+919876543210'
                      email_verified: true
                      google_id: null
                      provider_Type: null
                      created_at: '2026-02-26T10:30:00.000Z'
                      updated_at: '2026-02-26T10:30:00.000Z'
        '400':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Invalid or missing token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/update-profile:
    put:
      tags:
        - Auth
      summary: Update user profile
      description: Update authenticated user's name and phone. Requires JWT token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
                name:
                  type: string
                  minLength: 2
                  maxLength: 100
                  example: John Doe Updated
                phone:
                  type: string
                  pattern: '^[0-9+]{10,15}$'
                  example: '+919876543210'
              required:
                - email
                - name
                - phone
            examples:
              success:
                summary: Update profile request
                value:
                  email: john@example.com
                  name: John Doe Updated
                  phone: '+919987654321'
      responses:
        '200':
          description: Profile updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
              examples:
                success:
                  summary: Profile updated successfully
                  value:
                    status: true
                    message: Profile updated successfully !!
        '400':
          description: Phone number already exists or validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Invalid or missing token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/google-login:
    post:
      tags:
        - Auth
      summary: Google OAuth login
      description: Login or create account using Google OAuth credentials
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
                name:
                  type: string
                  minLength: 2
                  maxLength: 100
                  example: John Doe
                google_id:
                  type: string
                  example: '1234567890abcdef'
              required:
                - email
                - name
                - google_id
            examples:
              success:
                summary: Google login request
                value:
                  email: john.doe@gmail.com
                  name: John Doe
                  google_id: '123456789012345678901'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
              examples:
                success:
                  summary: Login successful
                  value:
                    status: true
                    message: Login successful !!
                    data:
                      accessToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6MSwicm9sZSI6InVzZXIifQ.dummytoken123456
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security: []

  /auth/logout:
    post:
      tags:
        - Auth
      summary: User logout
      description: Logout from current device. Revokes the current JWT token. Requires authentication.
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Logged out from this device successfully
              examples:
                success:
                  summary: Logout successful
                  value:
                    status: true
                    message: Logged out from this device successfully
        '400':
          description: Authorization token required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Invalid or missing token
          content:
            application/json:
              schema:
