  /products_metals/{productId}/updateMetal/{metalId}:
    put:
      tags:
        - Product Metals
      summary: Update metal component of a product
      security:
        - bearerAuth: []
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
        - name: metalId
          in: path
          required: true
          schema:
