          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProductMetalRequest'
            example:
              weight_grams: 5.75
              is_primary: true
      responses:
        '200':
          description: Metal component updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetProductMetalsResponse'
              example:
                status: true
                message: "Metal component updated successfully"
                data:
                  - id: 1
                    product_id: 1
                    metal_type: "gold"
                    purity_code: "22K"
                    purity_value: 91.6
                    weight_grams: 5.75
