  /products_metals/{productId}/deleteMetal/{metalId}:
    delete:
      tags:
        - Product Metals
      summary: Delete metal component from product
      security:
        - bearerAuth: []
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
        - name: metalId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Metal component deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetProductMetalsResponse'
              example:
                status: true
                message: "Metal component deleted successfully"
                data: []
        '404':
          description: Product or Metal component not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
