  /products/addProduct:
    post:
      tags:
        - Products
      summary: Add new product
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductRequest'
            example:
              name: "Gold Diamond Ring"
              sku: "RG-001"
              product_type: "ring"
              target_gender: "women"
              category_id: 1
              collection_id: 1
              default_metal_type: "gold"
              making_charge_type: "per_gram"
              making_charge_value: 500
              wastage_percent: 2.5
              margin_percent: 10
              gst_percent: 3
              status: "active"
      responses:
        '201':
          description: Product created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
              example:
                status: true
                message: "Product created successfully"
                data:
                  id: 1
                  name: "Gold Diamond Ring"
                  sku: "RG-001"
        '400':
          description: Invalid input or reference
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                status: false
                message: "Invalid category reference"
                data: null
        '409':
          description: SKU or name already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                status: false
                message: "SKU already exists"
                data: null
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                status: false
                message: "Something went wrong"
                data: null

  /products/getProducts:
    get:
      tags:
        - Products
      summary: Get all products
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
        - name: search
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [active, inactive]
        - name: category_id
          in: query
          schema:
            type: integer
        - name: collection_id
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Products fetched successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetProductsResponse'
              example:
                status: true
                message: "Products fetched successfully"
                data:
                  - id: 1
                    name: "Gold Diamond Ring"
                    sku: "RG-001"
                    category_name: "Rings"
                    collection_name: "Bridal Collection"
                    status: "active"
                meta:
                  page: 1
                  limit: 10
                  total: 1
                  totalPages: 1
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                status: false
                message: "Something went wrong"
                data: null

