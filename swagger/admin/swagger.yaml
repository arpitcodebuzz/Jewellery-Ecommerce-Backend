  /products_metals/{productId}/addMetal:
    post:
      tags:
        - Product Metals
      summary: Add metal component to product
      security:
        - bearerAuth: []
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddProductMetalRequest'
            example:
              metal_type: "gold"
              purity_code: "22K"
              purity_value: 91.6
              weight_grams: 5.5
              is_primary: true
      responses:
        '201':
          description: Metal component added successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetProductMetalsResponse'
              example:
                status: true
                message: "Metal component added successfully"
