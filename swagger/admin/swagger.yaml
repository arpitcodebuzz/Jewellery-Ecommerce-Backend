openapi: 3.0.0
info:
  title: ADMIN API
  version: 1.0.0
  description: Admin APIs

servers:
  - url: https://2prbc8z4-5000.inc1.devtunnels.ms/admin
    description: DevTunnel public server



tags:
  - name: Auth
    description: ADMIN APIs
  - name: Categories
    description: Category Management APIs
  - name: Collections
    description: Collection Management APIs
  - name: Products
    description: Product Management APIs
  - name: Product Metals
    description: Product Metal Components Management APIs
  - name: Product Stones
    description: Product Stone Components Management APIs
  - name: Product Images
    description: Product Image Management APIs
  - name: Metal Rates
    description: Metal Rate Management APIs
  - name: Stone Rates
    description: Stone Rate Management APIs
  - name: Orders
    description: Order Management APIs


paths:
  /auth/create-admin:
    post:
      tags:
        - Auth
      summary: Create new admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAdminRequest'
      responses:
        '200':
          description: Admin created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login:
    post:
      tags:
        - Auth
      summary: Login admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Admin logged in successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Admin not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/logout:
    post:
      tags:
        - Auth
      summary: Logout admin
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Admin logged out successfully
